services:
  baitin-landing:
    image: baitin-landing
    ports:
      - "5100:3000"
    env_file: ./.env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5438:5432"
    environment:
      POSTGRES_USER: baitin
      POSTGRES_PASSWORD: baitin
      POSTGRES_DB: baitin
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
